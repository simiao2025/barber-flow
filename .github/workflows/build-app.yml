# ============================================================
# BARBEAR-FLOW: Build do App Mobile com Expo EAS
# Trigger: push na branch main, path: barber-app/**
# ============================================================

name: Build App Mobile

on:
  push:
    branches: [main]
    paths:
      - 'barber-app/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options: [all, ios, android]
        default: 'all'
      profile:
        description: 'Build profile'
        required: true
        type: choice
        options: [production, preview, development]
        default: 'production'

jobs:
  # ============================================================
  # 1. TYPECHECK + LINT
  # ============================================================
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./barber-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: barber-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Upload checked code
        uses: actions/upload-artifact@v4
        with:
          name: barber-app-src
          path: barber-app/
          retention-days: 5

  # ============================================================
  # 2. EAS BUILD
  # ============================================================
  eas-build:
    name: EAS Build
    needs: typecheck-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./barber-app

    steps:
      - name: Download checked code
        uses: actions/download-artifact@v4
        with:
          name: barber-app-src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: barber-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm i -g eas-cli

      - name: EAS Build
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORM="${{ github.event.inputs.platform }}"
            PROFILE="${{ github.event.inputs.profile }}"
          else
            PLATFORM="all"
            PROFILE="production"
          fi

          if [ "$PLATFORM" = "all" ]; then
            eas build --platform all --non-interactive --profile $PROFILE
          else
            eas build --platform $PLATFORM --non-interactive --profile $PROFILE
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
